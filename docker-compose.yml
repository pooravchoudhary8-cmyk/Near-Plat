version: '3.8'

services:
  noir-app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/noir-shades
      - JWT_SECRET=supersecret123
      - PORT=5000
      - SMTP_HOST=smtp.ethereal.email
      - SMTP_PORT=587
    depends_on:
      - mongo

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - noir-mongo-data:/data/db

volumes:
  noir-mongo-data:
